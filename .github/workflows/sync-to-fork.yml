name: Sync to Fork
on:
  push:
    branches: [main]

jobs:
  sync:
    # Only run on the upstream repo — skip on the fork (where this file also exists)
    if: github.repository == 'TegridyRepoRanch/bloom-marketplace'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.FORK_SYNC_TOKEN }}

      - name: Push to fork mirror
        run: |
          git remote add fork https://x-access-token:${{ secrets.FORK_SYNC_TOKEN }}@github.com/HighestTegridyRepos/bloom-marketplace.git
          git push fork main --force
